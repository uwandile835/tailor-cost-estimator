{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register – Tailor Cost Estimator</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body class="auth-body">
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="logo-icon">✦</div>
        </div>
        <h1 class="auth-title">Create Account</h1>
        <p class="auth-sub">University of Zululand – Tailor System</p>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST" action="{% url 'register' %}" class="auth-form">
            {% csrf_token %}
            <div class="auth-field-row">
                <div class="auth-field">
                    <input type="text" name="first_name" placeholder="First name" required>
                </div>
                <div class="auth-field">
                    <input type="text" name="last_name" placeholder="Last name" required>
                </div>
            </div>
            <div class="auth-field">
                <input type="email" name="email" placeholder="Email address" required>
            </div>
            <div class="auth-field">
                <input type="password" name="password1" placeholder="Create password" required>
            </div>
            <div class="auth-field">
                <input type="password" name="password2" placeholder="Confirm password" required>
            </div>
            <button type="submit" class="auth-btn">Create Account</button>
            <div class="auth-links" style="justify-content:center;margin-top:12px">
                <a href="{% url 'login' %}">Already have an account? Log in</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
